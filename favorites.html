<script>
(function () {
  "use strict";

  var FAV_KEY = "favoriteIds";

  function getFavoriteIds() {
    try {
      var raw = localStorage.getItem(FAV_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function setFavoriteIds(ids) {
    try {
      localStorage.setItem(FAV_KEY, JSON.stringify(ids));
    } catch (e) {}
  }

  function removeFavorite(id) {
    var ids = getFavoriteIds().filter(function (x) { return x !== id; });
    setFavoriteIds(ids);
    render();
  }

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function render() {
    var ids = getFavoriteIds();
    var container = document.getElementById("fav-container");

    if (ids.length === 0) {
      container.innerHTML = '<p class="fav-empty">아직 즐겨찾기한 문장이 없어요.<br>마음에 드는 문장을 하트(♡)로 저장해보세요.</p>';
      return;
    }

    var items = ids
      .map(function (id) {
        return CONTENT_DATA.find(function (it) { return it.id === id; });
      })
      .filter(Boolean);

    if (items.length === 0) {
      container.innerHTML = '<p class="fav-empty">아직 즐겨찾기한 문장이 없어요.<br>마음에 드는 문장을 하트(♡)로 저장해보세요.</p>';
      return;
    }

    var html = '<ul class="list-ul">' + items.map(function (it) {
      var tags = (it.tags || []).map(function (t) {
        return '<span class="tag-pill">' + esc(t) + '</span>';
      }).join('');
      return '<li class="fav-item">' +
        '<div class="fav-item-body"><a href="quotes/' + it.id + '.html">' + esc(it.text) + '</a> ' +
        '<span class="list-source">— ' + esc(it.source) + '</span> ' + tags + '</div>' +
        '<button class="fav-remove" data-id="' + it.id + '">제거</button>' +
        '</li>';
    }).join('') + '</ul>';

    container.innerHTML = html;

    Array.prototype.forEach.call(container.querySelectorAll(".fav-remove"), function (btn) {
      btn.addEventListener("click", function () {
        removeFavorite(btn.getAttribute("data-id"));
      });
    });
  }

  render();

  var yearEl = document.getElementById("year");
  if (yearEl) yearEl.textContent = new Date().getFullYear();
})();
</script>
