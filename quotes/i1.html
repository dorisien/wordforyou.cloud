<script>
(function () {
  var FAV_KEY = "favoriteIds";
  var ITEM_ID = "i1";
  function getIds() {
    try { var r = localStorage.getItem(FAV_KEY); return r ? JSON.parse(r) : []; } catch (e) { return []; }
  }
  function setIds(ids) {
    try { localStorage.setItem(FAV_KEY, JSON.stringify(ids)); } catch (e) {}
  }
  var btn = document.getElementById('btn-fav');
  function refresh() {
    var active = getIds().indexOf(ITEM_ID) !== -1;
    btn.classList.toggle('is-active', active);
    btn.textContent = active ? '♥' : '♡';
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  }
  btn.addEventListener('click', function () {
    var ids = getIds();
    var idx = ids.indexOf(ITEM_ID);
    if (idx === -1) { ids.push(ITEM_ID); } else { ids.splice(idx, 1); }
    setIds(ids);
    refresh();
  });
  refresh();
})();
</script>
